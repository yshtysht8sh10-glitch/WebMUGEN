<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebMUGEN Documentation</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    main { width: min(900px, calc(100% - 32px)); padding: 40px 0; }
    h1 { margin-bottom: 8px; }
    .lead { margin-top: 0; color: #94a3b8; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 28px;
    }
    .card {
      display: block;
      padding: 22px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #111827;
      color: #e5e7eb;
      text-decoration: none;
    }
    .card:hover { border-color: #38bdf8; background: #172033; }
    .card h2 { margin: 0 0 8px; color: #38bdf8; }
    .card p { margin: 0; color: #cbd5e1; }
  </style>
</head>
<body>
  <main>
    <h1>WebMUGEN Documentation</h1>
    <p class="lead">閲覧するドキュメントを選択してください。</p>
    <div class="grid">
      <a class="card" href="./webmugen/index.html">
        <h2>WebMUGEN</h2>
        <p>互換性Matrix、Controller、Trigger、Runtime設計など、WebMUGEN実装側のドキュメントです。</p>
      </a>
      <a class="card" href="./mugen-spec/index.html">

      </a>
    </div>
  </main>
</body>
</html>
