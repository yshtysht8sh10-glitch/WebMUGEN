<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CNS Controller Document Template</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.75; margin: 0; background: #f7f7f7; color: #222; }
    header { background: #0f172a; color: white; padding: 28px 32px; }
    main { max-width: 1080px; margin: 0 auto; padding: 32px; background: white; }
    h1,h2,h3 { line-height: 1.35; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; }
    pre { background: #111827; color: #e5e7eb; padding: 16px; overflow: auto; border-radius: 8px; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th,td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    th { background: #f3f4f6; }
    .note { border-left: 5px solid #2563eb; background: #eff6ff; padding: 14px 18px; margin: 18px 0; }
    .warn { border-left: 5px solid #f59e0b; background: #fffbeb; padding: 14px 18px; margin: 18px 0; }
  </style>
</head>

<ol>
<li>位置づけ</li>

</html>
