<h1>WinMUGEN CMD Notes</h1>
<p>CMDは、キー入力列に名前を付け、CNSの <code>command = "name"</code> triggerから参照するためのファイル。</p>
<pre>[Command]
name = "a"
command = a
time = 1</pre>
<p>Phase13では単純なホールド・ボタン入力のみ対応する。</p>
