<h1>WinMUGEN Clsn Notes</h1>
<p>ClsnはAIR内で定義される当たり判定枠。</p>
<h2>種類</h2>
<ul><li><code>Clsn1</code>: 攻撃判定</li><li><code>Clsn2</code>: 食らい判定</li></ul>
<h2>例</h2>
<pre>Begin Action 200

Clsn2Default: 1
 Clsn2[0] = -10,-78,10,0

Clsn1: 1
 Clsn1[0] = 15,-50,55,-40

200,0, 0,0, 3</pre>
