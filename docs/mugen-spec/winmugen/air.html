  <h1>WinMUGEN AIR Notes</h1>
  <p>AIRはMUGENキャラクターのアニメーションを定義するファイル。</p>

  <h2>基本形式</h2>
  <pre>Begin Action 20
20,0, 0,0, 4
20,1, 0,0, 4
20,2, 0,0, 4</pre>

  <h2>Phase10対応範囲</h2>
  <p>Phase10では、Action番号と要素行のみを扱う。ClsnやLoopStartは後続Phaseで対応する。</p>
