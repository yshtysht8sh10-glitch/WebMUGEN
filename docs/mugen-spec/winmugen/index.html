<!doctype html>
<html lang="en" data-doc-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WinMUGEN Spec Notes</title>

<style>
:root{color-scheme:light dark}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.75;max-width:980px;margin:32px auto;padding:0 20px}
.lang-switch{display:flex;gap:8px;justify-content:flex-end;margin-bottom:24px}
.lang-switch button{border:1px solid #888;background:transparent;border-radius:999px;padding:6px 12px;cursor:pointer}
.lang-switch button.active{background:#111827;color:#fff;border-color:#111827}
[data-lang]{display:none}
html[data-doc-lang="en"] [data-lang="en"]{display:block}
html[data-doc-lang="ja"] [data-lang="ja"]{display:block}
pre{background:#111827;color:#e5e7eb;padding:16px;border-radius:8px;overflow:auto}
code{background:rgba(127,127,127,.18);padding:2px 5px;border-radius:4px}
a{color:#2563eb}
</style>
<script>
(function(){
  const saved = localStorage.getItem("webmugen-doc-lang");
  const lang = saved || "en";
  document.documentElement.setAttribute("data-doc-lang", lang);
  window.setWebMugenDocLang = function(nextLang){
    localStorage.setItem("webmugen-doc-lang", nextLang);
    document.documentElement.setAttribute("data-doc-lang", nextLang);
    document.querySelectorAll("[data-lang-button]").forEach(function(button){
      button.classList.toggle("active", button.getAttribute("data-lang-button") === nextLang);
    });
  };
  window.addEventListener("DOMContentLoaded", function(){
    document.querySelectorAll("[data-lang-button]").forEach(function(button){
      button.classList.toggle("active", button.getAttribute("data-lang-button") === lang);
    });
  });
})();
</script>

</head>
<body>
<nav class="lang-switch" aria-label="Language switch">
  <button type="button" data-lang-button="en" onclick="setWebMugenDocLang('en')">English</button>
  <button type="button" data-lang-button="ja" onclick="setWebMugenDocLang('ja')">日本語</button>
</nav>

<section data-lang="en">

</section>

<section data-lang="ja">

<h1>WinMUGEN仕様メモ</h1>
<p>このディレクトリには、WinMUGEN互換ファイルを実装するための実用メモを置きます。</p>
<ul>

<li><a href="./cns.html">CNS Notes</a></li>
<li><a href="./cmd.html">CMD Notes</a></li>
</ul>

</section>
</body>
</html>
