<style>

<body>
<div class="wrap">
<header>

<p class="lead" data-ja="WinMUGEN互換の実装状況を4段階で管理するHTML版チェックリスト。State Controllerは1 Controller 1行で管理します。" data-en="HTML checklist for tracking WinMUGEN compatibility in four statuses. State Controllers are tracked one controller per row.">WinMUGEN互換の実装状況を4段階で管理するHTML版チェックリスト。State Controllerは1 Controller 1行で管理します。</p>

<select id="status"><option value="all" data-ja="全ステータス" data-en="All statuses">全ステータス</option><option value="complete" data-ja="対応済み" data-en="Complete">対応済み</option><option value="partial" data-ja="一部対応" data-en="Partial">一部対応</option><option value="unsupported" data-ja="未対応" data-en="Unsupported">未対応</option><option value="untested" data-ja="未調査" data-en="Untested">未調査</option></select>
<select id="section"><option value="all" data-ja="全カテゴリ" data-en="All categories">全カテゴリ</option></select>
</div>
</header>
<section class="summary" id="summary"></section>
<section class="src card"><b data-ja="基準資料" data-en="Baseline references">基準資料</b><br><a href="https://www.elecbyte.com/mugendocs-11b1/trigger.html">Trigger Reference</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/sctrls.html">State Controllers</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/cns.html">CNS Format</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/common1.html">Common States</a></section>
<main id="tables"></main>
<p class="foot" data-ja="運用ルール: 実装やテストを追加したら、このHTMLとMarkdownの互換表を同時に更新する。Partialはsafe no-opまたは限定実装を含みます。" data-en="Maintenance rule: update this HTML and the Markdown matrix whenever implementation or tests change. Partial includes safe no-op shims or limited implementations.">運用ルール: 実装やテストを追加したら、このHTMLとMarkdownの互換表を同時に更新する。Partialはsafe no-opまたは限定実装を含みます。</p>

,['ParentVarSet','partial','Recognized safe no-op. Parent var lookup not implemented.'],['Pause','partial','Stores pause time field only. Full pause effect incomplete.'],['PlayerPush','partial','Stores player push flag only. Collision push integration needs audit.'],['PlaySnd','partial','Recognized safe no-op. Sound playback not implemented.'],['PosAdd','complete','Basic implementation exists.'],['PosFreeze','partial','Recognized safe no-op. Freeze behavior not implemented.'],['PosSet','complete','Basic implementation exists.'],['PowerAdd','complete','Basic implementation exists.'],['PowerSet','complete','Basic implementation exists.'],['Projectile','partial','Recognized safe no-op in CNS runtime; Projectile system exists separately.'],['RemoveExplod','partial','Recognized safe no-op. Explod removal not implemented here.'],['ReversalDef','partial','Recognized safe no-op. Reversal behavior not implemented.'],['ScreenBound','partial','Recognized safe no-op. Camera/screen bound behavior not implemented.'],['SelfState','partial','Basic state entry exists. Full custom-state ownership semantics incomplete.'],['SndPan','partial','Recognized safe no-op. Sound pan not implemented.'],['SprPriority','partial','Stores priority field only. Rendering priority needs audit.'],['StateTypeSet','complete','Basic implementation exists.'],['StopSnd','partial','Recognized safe no-op. Sound stopping not implemented.'],['SuperPause','partial','Stores super pause time field only. Full superpause behavior incomplete.'],['TargetBind','partial','Recognized safe no-op. Target binding not implemented.'],['TargetDrop','partial','Recognized safe no-op. Target list not implemented.'],['TargetFacing','partial','Recognized safe no-op. Target mutation not implemented.'],['TargetLifeAdd','partial','Recognized safe no-op. Target mutation not implemented.'],['TargetPowerAdd','partial','Recognized safe no-op. Target mutation not implemented.'],['TargetState','partial','Recognized safe no-op. Target custom ].map(([name,status,note])=>c(name,'State Controller','State Controller',status,note,note));

{id:'statedef',ja:'Statedef / 共通State',en:'Statedef / Common States',rows:[c('-3','グローバル常時State','Global always-running state','unsupported','未実装。-1/-2中心。','Not implemented. Runtime focuses on -1/-2.'),c('-2','グローバル常時State','Global always-running state','partial','CNS runtimeで一部実行。','Partially executed by CNS runtime.'),c('-1','コマンドState','Command state','partial','CMDルーティングに使用。','Used for CMD routing.'),c('0','立ち','Stand','complete','共通baselineあり。','Common baseline exists.'),c('10/11/12','しゃがみ','Crouch states','partial','common routeあり。','Common routes exist.'),c('20','前歩き','Walk forward','partial','common routeあり。','Common route exists.'),c('21','後ろ歩き','Walk back','partial','common back-walkとして追加。','Added as common back-walk.'),c('40/50/52','ジャンプ/着地','Jump / landing','partial','common baselineあり。State51未対応。','Common baseline exists. State51 unsupported.'),c('100/105','ダッシュ','Dash states','partial','PosAddベースの簡易実装。','Simple PosAdd-based implementation.'),c('120-155','ガード','Guard states','unsupported','防御実装に必要。','Required for defense.'),c('5000-5210','被弾/落下/復帰','Get-hit / fall / recovery','unsupported','Hit reaction互換に必要。','Required for hit reaction compatibility.')]},
{id:'controllers',ja:'State Controller',en:'State Controllers',rows:controllerRows},
{id:'triggers',ja:'Trigger',en:'Triggers',rows:[c('Abs / Floor / Ceil','数学関数','Math helpers','complete','数値式で対応。','Supported in numeric expressions.'),c('Command','コマンド','Command','complete','command set matching。','Command set matching.'),c('StateNo / StateType / MoveType / Time / Ctrl / Anim / AnimTime / Pos / Vel / Facing / Life / Power / Var / SysVar','基本Trigger','Core triggers','complete','基本比較対応。','Basic comparisons supported.'),c('GameTime / ScreenPos / BackEdgeDist / FrontEdgeDist','画面/時間系','Screen/time triggers','partial','内部値による近似。','Internal approximations.'),c('P2系 / EnemyNear / Target / Parent / Root','相手/参照系','Opponent/reference triggers','partial','opponent/self fallback中心。','Mostly opponent/self fallback.'),c('GetHitVar / HitFall / HitShakeOver / HitVel / InGuardDist','被弾/ガード系','Hit/guard triggers','partial','safe defaultまたは簡易値。','Safe defaults or simple values.'),c('NumEnemy / NumHelper / NumProj / NumExplod / NumTarget / NumProjID','個数系','Count triggers','partial','safe default中心。','Mostly safe defaults.'),c('ACos/ASin/ATan/Cos/Sin/Tan/Ln/Log/Exp/Cond/IfElse','未実装関数','Unsupported functions','unsupported','未実装。','Not implemented.')]},
{id:'redirects',ja:'Redirect / Player参照',en:'Redirects / Player References',rows:[c('enemy / enemynear','相手参照','Enemy reference','partial','opponentへmap。','Maps to opponent.'),c('parent / root','親/root参照','Parent/root reference','partial','non-helperではself fallback。','Self fallback for non-helper.'),c('target','Target参照','Target reference','partial','true target list未実装。','True target list not implemented.'),c('helper / partner / playerid','Helper/team/id参照','Helper/team/id reference','unsupported','未実装。','Not implemented.')]},

let lang='ja';function labelStatus(s){return statuses[s][lang]}function render(){const q=document.getElementById('q').value.toLowerCase();const sf=document.getElementById('status').value;const sec=document.getElementById('section').value;const tables=document.getElementById('tables');tables.innerHTML='';const counts={complete:0,partial:0,unsupported:0,untested:0};for(const section of sections){if(sec!=='all'&&sec!==section.id)continue;const rows=section.rows.filter(r=>{const hay=r.join(' ').toLowerCase();return(!q||hay.includes(q))&&(sf==='all'||r[3]===sf)});if(!rows.length)continue;const h=document.createElement('h2');h.textContent=section[lang];tables.appendChild(h);const table=document.createElement('table');table.innerHTML='<thead><tr><th>Item</th><th>'+(lang==='ja'?'内容':'Meaning')+'</th><th>Status</th><th>'+(lang==='ja'?'備考':'Notes')+'</th></tr></thead>';const tb=document.createElement('tbody');for(const r of rows){counts[r[3]]++;const tr=document.createElement('tr');tr.innerHTML='<td class="item">'+r[0]+'</td><td>'+(lang==='ja'?r[1]:r[2])+'</td><td><span class="pill '+statuses[r[3]].klass+'">'+labelStatus(r[3])+'</span></td><td class="note">'+(lang==='ja'?r[4]:r[5])+'</td>';tb.appendChild(tr)}table.appendChild(tb);tables.appendChild(table)}renderSummary(counts)}function renderSummary(counts){const s=document.getElementById('summary');s.innerHTML='';for(const k of ['complete','partial','unsupported','untested']){const d=document.createElement('div');d.className='card';d.innerHTML='<b>'+counts[k]+'</b><span>'+statuses[k][lang]+'</span>';s.appendChild(d)}}function translateStatic(){document.querySelectorAll('[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]});document.querySelectorAll('option[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]})}function initSections(){const sel=document.getElementById('section');for(const s of sections){const o=document.createElement('option');o.value=s.id;o.textContent=s[lang];o.dataset.ja=s.ja;o.dataset.en=s.en;sel.appendChild(o)}}function setLang(next){lang=next;document.documentElement.lang=next==='ja'?'ja':'en';document.getElementById('ja').classList.toggle('active',next==='ja');document.getElementById('en').classList.toggle('active',next==='en');translateStatic();render()}initSections();document.getElementById('q').addEventListener('input',render);document.getElementById('status').addEventListener('change',render);document.getElementById('section').addEventListener('change',render);document.getElementById('ja').addEventListener('click',()=>setLang('ja'));document.getElementById('en').addEventListener('click',()=>setLang('en'));render();
