<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WebMUGEN WinMUGEN Compatibility Matrix</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--head:#172033;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--link:#38bdf8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}.wrap{max-width:1480px;margin:0 auto;padding:24px}header{padding:10px 0 14px}h1{font-size:28px;margin:0 0 8px}h2{font-size:22px;margin:34px 0 12px}.lead,.muted{color:var(--muted)}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:8px}.toolbar button,.toolbar input,.toolbar select{background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:8px 10px}.toolbar button.active{border-color:var(--link);color:#fff}.toolbar input{min-width:260px;flex:1}.summary{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin:18px 0}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}.card b{font-size:24px}.card span{display:block;color:var(--muted);font-size:13px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:700;white-space:nowrap}.s-complete{background:rgba(22,163,74,.18);color:#86efac}.s-partial{background:rgba(2,132,199,.2);color:#7dd3fc}.s-fallback{background:rgba(147,51,234,.2);color:#d8b4fe}.s-safe-noop{background:rgba(100,116,139,.25);color:#cbd5e1}.s-issue-ready{background:rgba(202,138,4,.22);color:#fde68a}.s-not-started{background:rgba(220,38,38,.18);color:#fecaca}.s-audit-needed{background:transparent;color:#e2e8f0;border:1px dashed #94a3b8}.progress{display:inline-block;width:72px;height:5px;margin-left:7px;border-radius:999px;background:#334155;overflow:hidden;vertical-align:middle}.progress i{display:block;height:100%;background:currentColor}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:var(--panel)}table{width:100%;border-collapse:collapse;min-width:900px}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top}th{background:var(--head);color:#cbd5e1;font-size:13px}td{font-size:14px}tr:last-child td{border-bottom:0}tr:hover td{background:#101c31}.item{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#f8fafc;white-space:nowrap}.note{color:#cbd5e1;min-width:440px}.src a{color:var(--link)}.legend{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:8px;margin:16px 0}.legend .card{font-size:13px}.foot{color:var(--muted);font-size:13px;margin:28px 0}.error{color:#fecaca}@media(max-width:760px){.wrap{padding:14px}.summary,.legend{grid-template-columns:1fr}.toolbar input{min-width:100%}.item{white-space:normal}}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>WebMUGEN WinMUGEN 互換対応表</h1>
<p class="lead">実装済み、一部実装、Fallback、safe no-op、Issue準備済み、未着手、要監査を分離し、一部実装には互換完成度の目安を表示します。</p>
<div class="toolbar"><input id="q" type="search" placeholder="検索 / Search" /><select id="status"><option value="all">全ステータス</option></select><select id="section"><option value="all">全カテゴリ</option></select></div>
</header>
<section class="legend" id="legend"></section>
<section class="summary" id="summary"></section>
<section class="src card"><b>基準資料</b><br><a href="https://www.elecbyte.com/mugendocs-11b1/trigger.html">Trigger Reference</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/sctrls.html">State Controllers</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/cns.html">CNS Format</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/common1.html">Common States</a></section>
<main id="tables"><p class="muted">Markdown mirrorを読み込み中...</p></main>
<p class="foot">進捗率は作業時間ではなく、Parse/Load・Runtime semantics・Game integration・Tests・Diagnostics/docsの5観点から見た互換機能の完成度です。</p>
</div>
<script>
const STATUS={
 complete:{label:'完了',className:'s-complete',meaning:'本来の実ゲーム経路へ接続済みで、focused testまたは確認済みruntime usageがある。'},
 partial:{label:'一部完了',className:'s-partial',meaning:'本来の経路で一部実装済み。未対応範囲をNotesへ明記する。'},
 fallback:{label:'Fallback',className:'s-fallback',meaning:'本来とは別方式の代替・近似実装。互換実装への置換が必要。'},
 'safe-noop':{label:'safe no-op',className:'s-safe-noop',meaning:'名称は認識するがゲーム上の効果はない。クラッシュ回避用。'},
 'issue-ready':{label:'Issue書き出し済み',className:'s-issue-ready',meaning:'実装は未着手だが、Issue・完了条件・テスト方針が準備済み。'},
 'not-started':{label:'影も形もない',className:'s-not-started',meaning:'実装、shim、対応Issueのいずれも確認できない。'},
 'audit-needed':{label:'要監査',className:'s-audit-needed',meaning:'コードが存在する可能性はあるが、互換経路・テスト状況を未確認。'}
};
const ISSUE_READY={
 Explod:'#30（前提 #25/#31/#32）',ModifyExplod:'#33',RemoveExplod:'#38',ExplodBindTime:'#39',PlaySnd:'#28（前提 #26/#27）',StopSnd:'#29',SndPan:'#40',
 'hitdefpersist':'#21','movehitpersist':'#21','hitcountpersist':'#21',juggle:'#15',HitDefAttr:'#18',
 '120':'#16/#17','130':'#16/#17','131':'#16/#17','132':'#16/#17','140':'#16/#17','150':'#16/#17','151':'#16/#17','152':'#16/#17','153':'#16/#17','154':'#16/#17','155':'#16/#17',
 '5020':'#14','5030':'#14','5035':'#14','5040':'#14','5050':'#14','5060':'#14','5070':'#14','5080':'#14','5090':'#14','5100':'#14','5110':'#14','5120':'#14'
};
const OVERRIDE={
 HitDef:{kind:'partial',progress:68,note:'Implemented: ActiveHitDef主要parameter snapshot、AIR Clsn1/Clsn2 world projection、実collision、重複target hit抑止、ground/air velocity、pausetime、独立hitstun、GetHitVar snapshot、MoveContact/MoveHit系、Target登録とTarget Controller。 Missing: #14 fall/down完了確認、juggle #15、guard #16/#17、attr/priority #18、custom state #19、effects #20/#36、persistence #21、補助parameter #22、最終回帰 #23。 Evidence: Issues #3–#13のmain実装とfocused tests。'},
 PlayerPush:{kind:'fallback',progress:45,note:'Implemented: 地上水平push、PlayerPush=0、固定44x80矩形による縦重なり判定と空中cross-over。 Missing: Width/AIR Clsn2由来のpush box、完全なedge/corner semantics。'},
 Helper:{kind:'fallback',progress:20,note:'別Helper systemの存在が示されているが、CNS Helper Controllerはsafe no-opで未接続。既存systemの実ゲーム経路とowner/redirect semanticsは要監査。'},
 Projectile:{kind:'fallback',progress:20,note:'別Projectile systemの存在が示されているが、CNS Projectile Controllerはsafe no-opで未接続。HitDef/owner/lifecycle統合が必要。'},
 TargetBind:{kind:'partial',progress:55},TargetDrop:{kind:'partial',progress:65},TargetFacing:{kind:'partial',progress:60},TargetLifeAdd:{kind:'partial',progress:60},TargetPowerAdd:{kind:'partial',progress:55},TargetState:{kind:'partial',progress:55},TargetVelAdd:{kind:'partial',progress:65},TargetVelSet:{kind:'partial',progress:65},
 GetHitVar:{kind:'partial',progress:70},MoveContact:{kind:'partial',progress:70},MoveHit:{kind:'partial',progress:75},MoveGuarded:{kind:'partial',progress:35},HitCount:{kind:'partial',progress:60},NumTarget:{kind:'partial',progress:60},TargetID:{kind:'partial',progress:55},TargetStateNo:{kind:'partial',progress:55},
 '5000':{kind:'partial',progress:70},physics:{kind:'partial',progress:55},sprpriority:{kind:'partial',progress:30},AfterImageTime:{kind:'partial',progress:25},Pause:{kind:'partial',progress:35},SuperPause:{kind:'partial',progress:30},SelfState:{kind:'partial',progress:45},Width:{kind:'partial',progress:25},Trans:{kind:'partial',progress:25}
};
function normalize(item,legacy,note){
 if(OVERRIDE[item]) return {...OVERRIDE[item],note:OVERRIDE[item].note||note};
 if(ISSUE_READY[item]) return {kind:'issue-ready',progress:0,note:`Issue ready — ${ISSUE_READY[item]}. ${note}`};
 const low=note.toLowerCase();
 if(legacy==='Complete') return {kind:'complete',progress:100,note};
 if(legacy==='Untested') return {kind:'audit-needed',progress:null,note};
 if(legacy==='Unsupported') return {kind:'not-started',progress:0,note};
 if(low.includes('recognized safe no-op')) return {kind:'safe-noop',progress:0,note:'Recognized by CNS runtime; returns executed without changing game state. '+note.replace(/Recognized safe no-op\.?/i,'')};
 if(low.includes('safe default')||low.includes('placeholder')||low.includes('approximation')||low.includes('internal screen/player coordinate')){
   let p=30;if(low.includes('lookup')||low.includes('supported'))p=40;return {kind:'fallback',progress:p,note};
 }
 if(legacy==='Partial'){
   let p=40;
   if(low.includes('focused test')||low.includes('tested'))p+=20;
   if(low.includes('runtime')||low.includes('applies')||low.includes('sets ')||low.includes('reads real'))p+=15;
   if(low.includes('parser')||low.includes('parsed')||low.includes('stores'))p+=10;
   if(low.includes('rendering needs audit')||low.includes('full syntax incomplete'))p-=10;
   return {kind:'partial',progress:Math.max(10,Math.min(90,p)),note};
 }
 return {kind:'audit-needed',progress:null,note};
}
function parseMarkdown(md){
 const sections=[];let current=null;
 for(const raw of md.split(/\r?\n/)){
  const h=raw.match(/^##\s+(.+)/);if(h){current={title:h[1],rows:[]};sections.push(current);continue;}
  if(!current||!raw.startsWith('|')||/^\|[-: ]+\|/.test(raw))continue;
  const cells=raw.slice(1,-1).split('|').map(s=>s.trim());
  if(cells.length<3||/^(Status|StateNo|Field|Controller|Trigger|Redirect|Feature)$/i.test(cells[0]))continue;
  const statusIndex=cells.length>=4?2:1;const noteIndex=statusIndex+1;
  const legacy=cells[statusIndex];if(!['Complete','Partial','Unsupported','Untested'].includes(legacy))continue;
  current.rows.push({item:cells[0].replace(/`/g,''),meaning:statusIndex===2?cells[1]:'',legacy,note:cells[noteIndex]||''});
 }
 return sections.filter(s=>s.rows.length);
}
function badge(s){const meta=STATUS[s.kind];const pct=s.progress!=null&&s.kind!=='complete'?` ${s.progress}%`:'';const bar=s.progress!=null&&['partial','fallback'].includes(s.kind)?`<span class="progress"><i style="width:${s.progress}%"></i></span>`:'';return `<span class="pill ${meta.className}">${meta.label}${pct}</span>${bar}`;}
function render(sections){
 const statusSelect=document.querySelector('#status');for(const [k,v] of Object.entries(STATUS)){const o=document.createElement('option');o.value=k;o.textContent=v.label;statusSelect.append(o)}
 const sectionSelect=document.querySelector('#section');sections.forEach((s,i)=>{const o=document.createElement('option');o.value=String(i);o.textContent=s.title;sectionSelect.append(o)});
 document.querySelector('#legend').innerHTML=Object.entries(STATUS).map(([k,v])=>`<div class="card">${badge({kind:k,progress:k==='complete'?100:null})}<div class="muted">${v.meaning}</div></div>`).join('');
 const rows=[];sections.forEach((s,si)=>s.rows.forEach(r=>rows.push({...r,section:s.title,sectionIndex:si,status:normalize(r.item,r.legacy,r.note)})));
 const counts={};Object.keys(STATUS).forEach(k=>counts[k]=0);rows.forEach(r=>counts[r.status.kind]++);
 document.querySelector('#summary').innerHTML=Object.entries(STATUS).map(([k,v])=>`<div class="card"><b>${counts[k]}</b><span>${v.label}</span></div>`).join('');
 const draw=()=>{const q=document.querySelector('#q').value.toLowerCase();const sf=document.querySelector('#status').value;const sec=document.querySelector('#section').value;let html='';sections.forEach((s,si)=>{if(sec!=='all'&&sec!==String(si))return;const rs=rows.filter(r=>r.sectionIndex===si&&(sf==='all'||r.status.kind===sf)&&(!q||`${r.item} ${r.meaning} ${r.note} ${r.status.note}`.toLowerCase().includes(q)));if(!rs.length)return;html+=`<h2>${s.title}</h2><div class="table-wrap"><table><thead><tr><th>Item</th><th>Meaning</th><th>Status</th><th>Notes</th></tr></thead><tbody>`;for(const r of rs)html+=`<tr><td class="item">${r.item}</td><td>${r.meaning}</td><td>${badge(r.status)}</td><td class="note">${r.status.note}</td></tr>`;html+='</tbody></table></div>';});document.querySelector('#tables').innerHTML=html||'<p class="muted">該当項目なし</p>';};
 document.querySelector('#q').addEventListener('input',draw);statusSelect.addEventListener('change',draw);sectionSelect.addEventListener('change',draw);draw();
}
fetch('./winmugen-compatibility-matrix.md').then(r=>{if(!r.ok)throw new Error(`${r.status} ${r.statusText}`);return r.text()}).then(md=>render(parseMarkdown(md))).catch(e=>{document.querySelector('#tables').innerHTML=`<p class="error">Markdown mirrorの読み込みに失敗しました: ${e.message}</p>`});
</script>
</body>
</html>
