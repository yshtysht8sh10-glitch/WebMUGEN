<style>
:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--done:#16a34a;--partial:#ca8a04;--none:#dc2626;--unknown:#64748b;--link:#38bdf8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}.wrap{max-width:1280px;margin:0 auto;padding:24px}header{position:sticky;top:0;z-index:2;background:linear-gradient(180deg,#0f172a 88%,rgba(15,23,42,0));padding:20px 0 14px}h1{font-size:28px;margin:0 0 8px}h2{font-size:22px;margin:34px 0 12px}.lead{color:var(--muted);margin:0 0 16px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:8px}.toolbar button,.toolbar input,.toolbar select{background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:8px 10px}.toolbar button.active{border-color:var(--link);color:#fff}.toolbar input{min-width:260px;flex:1}.summary{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin:18px 0}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}.card b{font-size:24px}.card span{display:block;color:var(--muted);font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:700}.s-complete{background:rgba(22,163,74,.18);color:#86efac}.s-partial{background:rgba(202,138,4,.18);color:#fde68a}.s-unsupported{background:rgba(220,38,38,.18);color:#fecaca}.s-untested{background:rgba(100,116,139,.22);color:#cbd5e1}table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top}th{position:sticky;top:98px;background:#172033;z-index:1;color:#cbd5e1;font-size:13px}td{font-size:14px}tr:hover td{background:#101c31}.item{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#f8fafc;white-space:nowrap}.note{color:#cbd5e1}.src a{color:var(--link)}.hidden{display:none}.foot{color:var(--muted);font-size:13px;margin:28px 0}@media(max-width:760px){.wrap{padding:14px}.summary{grid-template-columns:1fr 1fr}th{position:static}.toolbar input{min-width:100%}table{display:block;overflow:auto}.item{white-space:normal}}

</head>
<body>
<div class="wrap">
<header>
<h1 data-ja="WebMUGEN WinMUGEN 互換対応表" data-en="WebMUGEN WinMUGEN Compatibility Matrix">WebMUGEN WinMUGEN 互換対応表</h1>
<p class="lead" data-ja="WinMUGEN互換の実装状況を4段階で管理するHTML版チェックリスト。Trigger拡張後の評価に更新済み。" data-en="HTML checklist for tracking WinMUGEN compatibility in four statuses. Updated after the runtime trigger expansion.">WinMUGEN互換の実装状況を4段階で管理するHTML版チェックリスト。Trigger拡張後の評価に更新済み。</p>
<div class="toolbar">
<button id="ja" class="active">日本語</button><button id="en">English</button>
<input id="q" type="search" placeholder="検索 / Search" />
<select id="status"><option value="all" data-ja="全ステータス" data-en="All statuses">全ステータス</option><option value="complete" data-ja="対応済み" data-en="Complete">対応済み</option><option value="partial" data-ja="一部対応" data-en="Partial">一部対応</option><option value="unsupported" data-ja="未対応" data-en="Unsupported">未対応</option><option value="untested" data-ja="未調査" data-en="Untested">未調査</option></select>
<select id="section"><option value="all" data-ja="全カテゴリ" data-en="All categories">全カテゴリ</option></select>
</div>
</header>
<section class="summary" id="summary"></section>
<section class="src card"><b data-ja="基準資料" data-en="Baseline references">基準資料</b><br><a href="https://www.elecbyte.com/mugendocs-11b1/trigger.html">Trigger Reference</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/sctrls.html">State Controllers</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/cns.html">CNS Format</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/common1.html">Common States</a></section>
<main id="tables"></main>
<p class="foot" data-ja="運用ルール: 実装やテストを追加したら、このHTMLとMarkdownの互換表を同時に更新する。対応済みはテストまたはアプリ統合確認がある場合のみ。" data-en="Maintenance rule: update this HTML and the Markdown matrix whenever implementation or tests change. Mark Complete only when covered by tests or confirmed app integration.">運用ルール: 実装やテストを追加したら、このHTMLとMarkdownの互換表を同時に更新する。対応済みはテストまたはアプリ統合確認がある場合のみ。</p>
</div>

,['Facing','向き','Facing','complete','数値比較。','Numeric comparison.'],['FVar','float変数','Float variables','partial','default 0 lookup。','Default 0 lookup.'],['GameTime','全体時間','Global time','partial','context/player fallback。','Context/player fallback.'],['GetHitVar','被弾変数','Get-hit variables','partial','主要defaultのみ。','Common defaults only.'],['HitCount/UniqHitCount','ヒット数','Hit count','partial','HitCountはdefault 0。Uniqは未対応。','HitCount defaults 0; Uniq unsupported.'],['HitDefAttr','HitDef属性','HitDef attributes','unsupported','未実装。','Not implemented.'],['HitFall/HitOver/HitShakeOver/HitVel','被弾状態','Hit state','partial','safe defaults / optional fields。','Safe defaults / optional fields.'],['HitPauseTime','HitPause時間','Hit pause time','complete','player.hitPause参照。','Reads player.hitPause.'],['ID/PlayerIDExist','ID系','ID lookup','unsupported','未実装。','Not implemented.'],['InGuardDist','ガード距離','Guard distance','partial','単純距離近似。','Simple distance approximation.'],['IsHelper','Helper判定','Helper check','partial','default 0。','Default 0.'],['IsHomeTeam/TeamMode','チーム系','Team metadata','unsupported','未実装。','Not implemented.'],['Life/LifeMax','Life系','Life values','complete','Lifeは実値、LifeMaxはdefault。','Life actual; LifeMax default.'],['MatchNo/MatchOver','Match系','Match metadata','unsupported','未実装。','Not implemented.'],['MoveContact/MoveHit/MoveGuarded','接触フラグ','Move contact flags','partial','activeHitDef/hitDefUsed近似。','Approximated with activeHitDef/hitDefUsed.'],['MoveReversed','Reversal状態','Move reversed','unsupported','未実装。','Not implemented.'],['MoveType','MoveType','MoveType','complete','基本対応。','Basic support.'],['NumEnemy/NumExplod/NumHelper/NumPartner/NumProj/NumProjID/NumTarget','個数系','Count triggers','partial','safe defaults。','Safe defaults.'],['P2BodyDist/P2Dist','相手距離','Opponent distance','partial','座標差分。','Coordinate difference.'],['P2Life/P2MoveType/P2StateNo/P2StateType/P2Facing/P2Ctrl','P2系','P2 values','partial','opponent参照またはdefault。','Reads opponent or default.'],['P1Name/P3Name/P4Name','名前alias','Name aliases','unsupported','未実装。','Not implemented.'],['PalNo','Palette番号','Palette number','unsupported','未実装。','Not implemented.'],['Pi/E','数学定数','Math constants','unsupported','未実装。','Not implemented.'],['Pos','位置','Position','complete','x/y比較。','X/Y comparison.'],['Power/PowerMax','Power系','Power values','complete','Powerはdefault含む。PowerMaxは3000。','Power with default; PowerMax 3000.'],['PrevStateNo','前State','Previous state','partial','optional field参照。追跡は未完。','Reads optional field; tracking incomplete.'],['ProjCancelTime/ProjContactTime/ProjGuardedTime/ProjHitTime','Projectile時間','Projectile time triggers','partial','safe default -1。','Safe default -1.'],['ProjContact/ProjGuarded/ProjHit','Projectile真偽','Projectile booleans','unsupported','未実装。','Not implemented.'],['Random','乱数','Random','partial','placeholder 500。','Placeholder 500.'],['RoundNo/RoundsExisted/RoundState','Round系','Round values','partial','RoundStateは基本対応、他はdefault。','RoundState basic; others default.'],['ScreenPos','画面座標','Screen position','partial','内部座標近似。','Internal coordinate approximation.'],['StateNo/StateType/SysVar/Time/Var/Vel','基本Trigger','Core triggers','complete','基本比較対応。','Basic comparisons supported.'],['SysFVar','System float variables','System float variables','unsupported','未実装。','Not implemented.'],['TeamSide','Team side','Team side','partial','context/player fallback。','Context/player fallback.'],['TicksPerSecond','FPS定数','FPS constant','complete','60を返す。','Returns 60.']]},

let lang='ja';
function labelStatus(s){return statuses[s][lang];}
function render(){const q=document.getElementById('q').value.toLowerCase();const sf=document.getElementById('status').value;const sec=document.getElementById('section').value;const tables=document.getElementById('tables');tables.innerHTML='';const counts={complete:0,partial:0,unsupported:0,untested:0};for(const section of sections){if(sec!=='all'&&sec!==section.id)continue;const rows=section.rows.filter(r=>{const hay=r.join(' ').toLowerCase();return(!q||hay.includes(q))&&(sf==='all'||r[3]===sf)});if(!rows.length)continue;const h=document.createElement('h2');h.textContent=section[lang];tables.appendChild(h);const table=document.createElement('table');table.innerHTML='<thead><tr><th>Item</th><th>'+(lang==='ja'?'内容':'Meaning')+'</th><th>Status</th><th>'+(lang==='ja'?'備考':'Notes')+'</th></tr></thead>';const tb=document.createElement('tbody');for(const r of rows){counts[r[3]]++;const tr=document.createElement('tr');tr.innerHTML='<td class="item">'+r[0]+'</td><td>'+(lang==='ja'?r[1]:r[2])+'</td><td><span class="pill '+statuses[r[3]].klass+'">'+labelStatus(r[3])+'</span></td><td class="note">'+(lang==='ja'?r[4]:r[5])+'</td>';tb.appendChild(tr)}table.appendChild(tb);tables.appendChild(table)}renderSummary(counts)}
function renderSummary(counts){const s=document.getElementById('summary');s.innerHTML='';for(const k of ['complete','partial','unsupported','untested']){const d=document.createElement('div');d.className='card';d.innerHTML='<b>'+counts[k]+'</b><span>'+statuses[k][lang]+'</span>';s.appendChild(d)}}
function translateStatic(){document.querySelectorAll('[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]});document.querySelectorAll('option[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]})}
function initSections(){const sel=document.getElementById('section');for(const s of sections){const o=document.createElement('option');o.value=s.id;o.textContent=s[lang];o.dataset.ja=s.ja;o.dataset.en=s.en;sel.appendChild(o)}}
function setLang(next){lang=next;document.documentElement.lang=next==='ja'?'ja':'en';document.getElementById('ja').classList.toggle('active',next==='ja');document.getElementById('en').classList.toggle('active',next==='en');translateStatic();render()}
initSections();document.getElementById('q').addEventListener('input',render);document.getElementById('status').addEventListener('change',render);document.getElementById('section').addEventListener('change',render);document.getElementById('ja').addEventListener('click',()=>setLang('ja'));document.getElementById('en').addEventListener('click',()=>setLang('en'));render();
</script>
