<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WebMUGEN WinMUGEN Compatibility Matrix</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--head:#172033;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--link:#38bdf8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}.wrap{max-width:1280px;margin:0 auto;padding:24px}header{padding:10px 0 14px}h1{font-size:28px;margin:0 0 8px}h2{font-size:22px;margin:34px 0 12px}.lead{color:var(--muted);margin:0 0 16px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:8px}.toolbar button,.toolbar input,.toolbar select{background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:8px 10px}.toolbar button.active{border-color:var(--link);color:#fff}.toolbar input{min-width:260px;flex:1}.summary{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px;margin:18px 0}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}.card b{font-size:24px}.card span{display:block;color:var(--muted);font-size:13px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:700}.s-complete{background:rgba(22,163,74,.18);color:#86efac}.s-partial{background:rgba(202,138,4,.18);color:#fde68a}.s-unsupported{background:rgba(220,38,38,.18);color:#fecaca}.s-untested{background:rgba(100,116,139,.22);color:#cbd5e1}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:var(--panel)}table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top}th{position:static;background:var(--head);color:#cbd5e1;font-size:13px}td{font-size:14px}tr:last-child td{border-bottom:0}tr:hover td{background:#101c31}.item{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#f8fafc;white-space:nowrap}.note{color:#cbd5e1}.src a{color:var(--link)}.foot{color:var(--muted);font-size:13px;margin:28px 0}@media(max-width:760px){.wrap{padding:14px}.summary{grid-template-columns:1fr 1fr}.toolbar input{min-width:100%}.item{white-space:normal}}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1 data-ja="WebMUGEN WinMUGEN 互換対応表" data-en="WebMUGEN WinMUGEN Compatibility Matrix">WebMUGEN WinMUGEN 互換対応表</h1>
<p class="lead" data-ja="WinMUGEN互換の実装状況を4段階で管理するHTML版チェックリスト。全カテゴリを1項目1行で管理します。" data-en="HTML checklist for tracking WinMUGEN compatibility in four statuses. Every category is tracked one item per row.">WinMUGEN互換の実装状況を4段階で管理するHTML版チェックリスト。全カテゴリを1項目1行で管理します。</p>
<div class="toolbar">
<button id="ja" class="active">日本語</button><button id="en">English</button>
<input id="q" type="search" placeholder="検索 / Search" />
<select id="status"><option value="all" data-ja="全ステータス" data-en="All statuses">全ステータス</option><option value="complete" data-ja="対応済み" data-en="Complete">対応済み</option><option value="partial" data-ja="一部対応" data-en="Partial">一部対応</option><option value="unsupported" data-ja="未対応" data-en="Unsupported">未対応</option><option value="untested" data-ja="未調査" data-en="Untested">未調査</option></select>
<select id="section"><option value="all" data-ja="全カテゴリ" data-en="All categories">全カテゴリ</option></select>
</div>
</header>
<section class="summary" id="summary"></section>
<section class="src card"><b data-ja="基準資料" data-en="Baseline references">基準資料</b><br><a href="https://www.elecbyte.com/mugendocs-11b1/trigger.html">Trigger Reference</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/sctrls.html">State Controllers</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/cns.html">CNS Format</a> / <a href="https://www.elecbyte.com/mugendocs-11b1/common1.html">Common States</a></section>
<main id="tables"></main>
<p class="foot" data-ja="運用ルール: 実装やテストを追加したら、このHTMLとMarkdownの互換表を同時に更新する。item列ではスラッシュ、範囲、カンマ区切りで複数項目をまとめない。" data-en="Maintenance rule: update this HTML and the Markdown matrix whenever implementation or tests change. Do not group multiple entries in the item column with slashes, ranges, or comma-separated lists.">運用ルール: 実装やテストを追加したら、このHTMLとMarkdownの互換表を同時に更新する。item列ではスラッシュ、範囲、カンマ区切りで複数項目をまとめない。</p>
</div>
<script>
const statuses={complete:{ja:'対応済み',en:'Complete',klass:'s-complete'},partial:{ja:'一部対応',en:'Partial',klass:'s-partial'},unsupported:{ja:'未対応',en:'Unsupported',klass:'s-unsupported'},untested:{ja:'未調査',en:'Untested',klass:'s-untested'}};
const row=(item,ja,en,status,noteJa,noteEn)=>[item,ja,en,status,noteJa,noteEn];
const same=(item,kind,status,note)=>row(item,kind,kind,status,note,note);
const stateRows=[['-3','partial'],['-2','partial'],['-1','partial'],['0','complete'],['10','partial'],['11','partial'],['12','partial'],['20','partial'],['21','partial'],['40','partial'],['41','untested'],['42','untested'],['45','unsupported'],['50','partial'],['51','unsupported'],['52','partial'],['100','partial'],['101','untested'],['102','untested'],['103','untested'],['104','untested'],['105','partial'],['106','untested'],['107','untested'],['120','unsupported'],['130','unsupported'],['131','unsupported'],['132','unsupported'],['140','unsupported'],['150','unsupported'],['151','unsupported'],['152','unsupported'],['153','unsupported'],['154','unsupported'],['155','unsupported'],['170','unsupported'],['171','unsupported'],['172','unsupported'],['173','unsupported'],['180','unsupported'],['181','unsupported'],['190','unsupported'],['191','unsupported'],['192','unsupported'],['193','unsupported'],['194','unsupported'],['195','unsupported'],['196','unsupported'],['197','unsupported'],['198','unsupported'],['199','unsupported'],['5000','unsupported'],['5001','unsupported'],['5010','unsupported'],['5011','unsupported'],['5020','unsupported'],['5030','unsupported'],['5035','unsupported'],['5040','unsupported'],['5050','unsupported'],['5060','unsupported'],['5070','unsupported'],['5080','unsupported'],['5090','unsupported'],['5100','unsupported'],['5110','unsupported'],['5120','unsupported'],['5150','unsupported'],['5200','unsupported'],['5210','unsupported']].map(([item,status])=>same(item,'StateDef',status,'See Markdown notes for detailed meaning.'));
const headerRows=['type:complete','movetype:complete','physics:partial','anim:complete','ctrl:complete','poweradd:unsupported','juggle:unsupported','facep2:unsupported','hitdefpersist:unsupported','movehitpersist:unsupported','hitcountpersist:unsupported','sprpriority:partial'].map(x=>{const [item,status]=x.split(':');return same(item,'StateDef header field',status,'Parsed/applied status is tracked per field.')});
const controllerStatus={AfterImage:'partial',AfterImageTime:'partial',AllPalFX:'partial',AngleAdd:'partial',AngleDraw:'partial',AngleMul:'partial',AngleSet:'partial',AppendToClipboard:'partial',AssertSpecial:'partial',AttackDist:'partial',AttackMulSet:'partial',BGPalFX:'partial',BindToParent:'partial',BindToRoot:'partial',BindToTarget:'partial',ChangeAnim:'complete',ChangeAnim2:'partial',ChangeState:'complete',ClearClipboard:'partial',CtrlSet:'complete',DefenceMulSet:'partial',DestroySelf:'partial',DisplayToClipboard:'partial',EnvColor:'partial',EnvShake:'partial',Explod:'partial',ExplodBindTime:'partial',ForceFeedback:'partial',GameMakeAnim:'partial',Gravity:'partial',Helper:'partial',HitAdd:'partial',HitBy:'partial',HitDef:'partial',HitFallDamage:'partial',HitFallSet:'partial',HitFallVel:'partial',HitOverride:'partial',HitVelSet:'partial',LifeAdd:'complete',LifeSet:'complete',MakeDust:'partial',ModifyExplod:'partial',MoveHitReset:'partial',MoveTypeSet:'complete',NotHitBy:'partial',Null:'complete',Offset:'partial',PalFX:'partial',ParentVarAdd:'partial',ParentVarSet:'partial',Pause:'partial',PlayerPush:'partial',PlaySnd:'partial',PosAdd:'complete',PosFreeze:'partial',PosSet:'complete',PowerAdd:'complete',PowerSet:'complete',Projectile:'partial',RemoveExplod:'partial',ReversalDef:'partial',ScreenBound:'partial',SelfState:'partial',SndPan:'partial',SprPriority:'partial',StateTypeSet:'complete',StopSnd:'partial',SuperPause:'partial',TargetBind:'partial',TargetDrop:'partial',TargetFacing:'partial',TargetLifeAdd:'partial',TargetPowerAdd:'partial',TargetState:'partial',TargetVelAdd:'partial',TargetVelSet:'partial',Trans:'partial',Turn:'complete',VarAdd:'complete',VarRandom:'partial',VarRangeSet:'partial',VarSet:'complete',VelAdd:'complete',VelMul:'complete',VelSet:'complete',Width:'partial',Zoom:'partial'};
const controllerRows=Object.entries(controllerStatus).map(([item,status])=>same(item,'State Controller',status,status==='complete'?'Basic implementation exists.':'Limited support or safe compatibility shim.'));
const triggerStatus={Abs:'complete',ACos:'complete',AILevel:'complete',Alive:'complete',Anim:'complete',AnimElem:'complete',AnimElemNo:'unsupported',AnimElemTime:'complete',AnimExist:'unsupported',AnimTime:'complete',ASin:'complete',ATan:'complete',AuthorName:'partial',BackEdge:'unsupported',BackEdgeDist:'partial','BodyDist X':'unsupported','BodyDist Y':'unsupported',CanRecover:'partial',Ceil:'complete',Command:'complete',Cond:'complete',Const:'partial',Cos:'complete',Ctrl:'complete',DrawGame:'partial',E:'complete',Exp:'complete',Facing:'complete',Floor:'complete',FrontEdge:'unsupported',FrontEdgeDist:'partial',FVar:'partial',GameTime:'partial',GetHitVar:'partial',HitCount:'partial',HitDefAttr:'unsupported',HitFall:'partial',HitOver:'partial',HitPauseTime:'complete',HitShakeOver:'partial','HitVel X':'partial','HitVel Y':'partial',ID:'unsupported',IfElse:'complete',InGuardDist:'partial',IsHelper:'partial',IsHomeTeam:'unsupported',Life:'complete',LifeMax:'partial',Ln:'complete',Log:'complete',Lose:'partial',LoseKO:'unsupported',LoseTime:'unsupported',MatchNo:'unsupported',MatchOver:'unsupported',MoveContact:'partial',MoveGuarded:'partial',MoveHit:'partial',MoveReversed:'unsupported',MoveType:'complete',Name:'partial',NumEnemy:'partial',NumExplod:'partial',NumHelper:'partial',NumPartner:'partial',NumProj:'partial',NumProjID:'partial',NumTarget:'partial',P1Name:'unsupported','P2BodyDist X':'partial','P2BodyDist Y':'partial','P2Dist X':'partial','P2Dist Y':'partial',P2Life:'partial',P2MoveType:'partial',P2Name:'partial',P2StateNo:'partial',P2StateType:'partial',P3Name:'unsupported',P4Name:'unsupported',PalNo:'unsupported','ParentDist X':'unsupported','ParentDist Y':'unsupported',Pi:'complete',PlayerIDExist:'unsupported','Pos X':'complete','Pos Y':'complete',Power:'complete',PowerMax:'partial',PrevStateNo:'partial',ProjCancelTime:'partial',ProjContact:'unsupported',ProjContactTime:'partial',ProjGuarded:'unsupported',ProjGuardedTime:'partial',ProjHit:'unsupported',ProjHitTime:'partial',Random:'partial','RootDist X':'unsupported','RootDist Y':'unsupported',RoundNo:'partial',RoundsExisted:'partial',RoundState:'complete','ScreenPos X':'partial','ScreenPos Y':'partial',SelfAnimExist:'unsupported',Sin:'complete',StateNo:'complete',StateType:'complete',SysFVar:'unsupported',SysVar:'complete',Tan:'complete',TeamMode:'unsupported',TeamSide:'partial',TicksPerSecond:'complete',Time:'complete',UniqHitCount:'unsupported',Var:'complete','Vel X':'complete','Vel Y':'complete',Win:'partial',WinKO:'unsupported',WinPerfect:'unsupported',WinTime:'unsupported'};
const triggerRows=Object.entries(triggerStatus).map(([item,status])=>same(item,'Trigger',status,status==='complete'?'Implemented in runtime trigger evaluator.':status==='partial'?'Limited implementation or safe default.':'Not implemented.'));
const redirectData=Object.entries({enemy:'partial',enemynear:'partial',helper:'unsupported',parent:'partial',partner:'unsupported',root:'partial',target:'partial',playerid:'unsupported'}).map(([item,status])=>same(item,'Redirect',status,status==='unsupported'?'Lookup not implemented.':'Basic fallback support.'));
const exprRows=Object.entries({'=':'complete','!=':'complete','>':'complete','>=':'complete','<':'complete','<=':'complete','= [a,b]':'complete','!= [a,b]':'complete','triggerall AND':'complete','triggerN OR':'complete','&&':'complete','||':'complete','!':'complete','Parentheses':'partial','+':'complete','-':'complete','*':'complete','/':'complete','%':'complete','Unary minus':'partial','var(n)':'complete','sysvar(n)':'complete','fvar(n)':'partial','Redirect expression chain':'partial'}).map(([item,status])=>same(item,'Expression feature',status,status==='complete'?'Supported.':status==='partial'?'Limited support.':'Not implemented.'));
const cmdRows=Object.entries({'Single button commands':'complete','Hold direction /D':'complete','Hold direction /F':'complete','Hold direction /B':'complete','Hold direction /U':'complete','Direction sequences':'partial','Button sequences':'partial','Simultaneous buttons':'partial','Release commands':'untested','Buffer time':'partial','command.time':'untested','command.buffer.time':'untested','$ direction match':'partial','/ hold prefix':'partial','+ simultaneous input':'partial'}).map(([item,status])=>same(item,'CMD feature',status,status==='complete'?'Basic support.':status==='partial'?'Needs WinMUGEN timing/syntax audit.':status==='untested'?'Needs verification.':'Not implemented.'));
const sections=[{id:'statedef',ja:'Statedef / 共通State',en:'Statedef / Common States',rows:stateRows},{id:'headers',ja:'StateDef Header',en:'StateDef Headers',rows:headerRows},{id:'controllers',ja:'State Controller',en:'State Controllers',rows:controllerRows},{id:'triggers',ja:'Trigger',en:'Triggers',rows:triggerRows},{id:'redirects',ja:'Redirect / Player参照',en:'Redirects / Player References',rows:redirectData},{id:'expressions',ja:'Expression / Operator',en:'Expressions / Operators',rows:exprRows},{id:'cmd',ja:'CMD互換',en:'CMD Compatibility',rows:cmdRows}];
let lang='ja';
function labelStatus(s){return statuses[s][lang]}
function render(){const q=document.getElementById('q').value.toLowerCase();const sf=document.getElementById('status').value;const sec=document.getElementById('section').value;const tables=document.getElementById('tables');tables.innerHTML='';const counts={complete:0,partial:0,unsupported:0,untested:0};for(const section of sections){if(sec!=='all'&&sec!==section.id)continue;const rows=section.rows.filter(r=>{const hay=r.join(' ').toLowerCase();return(!q||hay.includes(q))&&(sf==='all'||r[3]===sf)});if(!rows.length)continue;const h=document.createElement('h2');h.textContent=section[lang];tables.appendChild(h);const wrap=document.createElement('div');wrap.className='table-wrap';const table=document.createElement('table');table.innerHTML='<thead><tr><th>Item</th><th>'+(lang==='ja'?'内容':'Meaning')+'</th><th>Status</th><th>'+(lang==='ja'?'備考':'Notes')+'</th></tr></thead>';const tb=document.createElement('tbody');for(const r of rows){counts[r[3]]++;const tr=document.createElement('tr');tr.innerHTML='<td class="item">'+r[0]+'</td><td>'+(lang==='ja'?r[1]:r[2])+'</td><td><span class="pill '+statuses[r[3]].klass+'">'+labelStatus(r[3])+'</span></td><td class="note">'+(lang==='ja'?r[4]:r[5])+'</td>';tb.appendChild(tr)}table.appendChild(tb);wrap.appendChild(table);tables.appendChild(wrap)}renderSummary(counts)}
function renderSummary(counts){const s=document.getElementById('summary');s.innerHTML='';for(const k of ['complete','partial','unsupported','untested']){const d=document.createElement('div');d.className='card';d.innerHTML='<b>'+counts[k]+'</b><span>'+statuses[k][lang]+'</span>';s.appendChild(d)}}
function translateStatic(){document.querySelectorAll('[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]});document.querySelectorAll('option[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]})}
function initSections(){const sel=document.getElementById('section');for(const s of sections){const o=document.createElement('option');o.value=s.id;o.textContent=s[lang];o.dataset.ja=s.ja;o.dataset.en=s.en;sel.appendChild(o)}}
function setLang(next){lang=next;document.documentElement.lang=next==='ja'?'ja':'en';document.getElementById('ja').classList.toggle('active',next==='ja');document.getElementById('en').classList.toggle('active',next==='en');translateStatic();render()}
initSections();document.getElementById('q').addEventListener('input',render);document.getElementById('status').addEventListener('change',render);document.getElementById('section').addEventListener('change',render);document.getElementById('ja').addEventListener('click',()=>setLang('ja'));document.getElementById('en').addEventListener('click',()=>setLang('en'));render();
</script>
</body>
</html>
