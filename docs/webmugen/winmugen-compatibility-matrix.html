let lang='ja';
const $=id=>document.getElementById(id);
function labelStatus(s){const x=statuses[s];return `<span class="pill ${x.klass}"><span class="dot ${x.dot}"></span>${x[lang]}</span>`}
function render(){document.documentElement.lang=lang;document.querySelectorAll('[data-ja]').forEach(el=>{el.textContent=el.dataset[lang]});$('ja').classList.toggle('active',lang==='ja');$('en').classList.toggle('active',lang==='en');const secSel=$('section');if(secSel.options.length===1){sections.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s[lang];o.dataset.ja=s.ja;o.dataset.en=s.en;secSel.appendChild(o)})}else{Array.from(secSel.options).slice(1).forEach((o,i)=>o.textContent=sections[i][lang])}const q=$('q').value.trim().toLowerCase();const st=$('status').value;const sc=$('section').value;let html='';let counts={complete:0,partial:0,unsupported:0,untested:0};sections.forEach(sec=>{if(sc!=='all'&&sc!==sec.id)return;let rows=sec.rows.filter(r=>{const hay=r.join(' ').toLowerCase();return (!q||hay.includes(q))&&(st==='all'||r[3]===st)});if(!rows.length)return;html+=`<section><h2>${sec[lang]}</h2><table><thead><tr><th>${lang==='ja'?'項目':'Item'}</th><th>${lang==='ja'?'内容':'Meaning'}</th><th>${lang==='ja'?'4段階評価':'4-level status'}</th><th>${lang==='ja'?'備考':'Notes'}</th></tr></thead><tbody>`;rows.forEach(r=>{counts[r[3]]++;html+=`<tr><td class="item">${r[0]}</td><td>${lang==='ja'?r[1]:r[2]}</td><td>${labelStatus(r[3])}</td><td class="note">${lang==='ja'?r[4]:r[5]}</td></tr>`});html+='</tbody></table></section>'});$('tables').innerHTML=html;$('summary').innerHTML=Object.keys(statuses).map(k=>`<div class="card"><b>${counts[k]}</b><span>${statuses[k][lang]}</span></div>`).join('');$('legend').innerHTML=Object.keys(statuses).map(k=>labelStatus(k)).join('')}
$('ja').onclick=()=>{lang='ja';render()};$('en').onclick=()=>{lang='en';render()};$('q').oninput=render;$('status').onchange=render;$('section').onchange=render;render();
</script>
