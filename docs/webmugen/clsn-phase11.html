<h1>Clsn Phase11</h1>
<p>Phase11では、AIRのClsn1/Clsn2を読み、現在アニメーション要素に応じた判定枠を取得できるようにする。</p>
<h2>対応</h2>
<ul>
<li><code>Clsn1Default</code></li>
<li><code>Clsn2Default</code></li>
<li><code>Clsn1</code></li>
<li><code>Clsn2</code></li>
<li>AirElementへのClsn保持</li>
<li>facingに応じた左右反転</li>
<li>Canvasデバッグ描画</li>
</ul>
<h2>現時点の制限</h2>
<p>ヒット解決自体はまだ旧SimpleCollision中心。次PhaseでClsn1とClsn2の交差を使った完全なヒット判定へ移行する。</p>
