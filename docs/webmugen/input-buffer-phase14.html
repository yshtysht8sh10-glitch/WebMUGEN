<h1>Input Buffer Phase14</h1>
<p>Phase14では、入力バッファと時系列コマンド判定を追加する。</p>
<h2>対応</h2>
<ul>
<li>InputBuffer</li>
<li>方向トークン <code>F</code>, <code>B</code>, <code>U</code>, <code>D</code>, <code>DF</code>, <code>DB</code>, <code>UF</code>, <code>UB</code></li>
<li><code>D,DF,F,a</code> のような時系列コマンド</li>
<li><code>/F</code> のようなホールド入力</li>
</ul>
<h2>現時点の制限</h2>
<ul>
<li>MUGENの <code>~</code>, <code>$</code>, <code>></code> 等は未対応</li>
<li>左右反転時のF/B解決はまだ簡易</li>
</ul>
</body></html>
