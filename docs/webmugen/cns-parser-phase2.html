<html lang="ja">
<head>

  <title>CNS Parser Phase2</title>
  <style>
    body { font-family: system-ui, sans-serif; line-height: 1.75; max-width: 980px; margin: 32px auto; padding: 0 20px; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; }

<body>
  <h1>CNS Parser Phase2</h1>
  <p>Phase2では、CNSテキストをWebMUGEN内部形式へ変換する最小parserを追加する。</p>

  <h2>対応範囲</h2>
  <ul>
    <li><code>[StateDef n]</code></li>
    <li><code>[State ...]</code></li>
    <li><code>key = value</code></li>
    <li><code>trigger1 = ...</code></li>
    <li>カンマ区切り値</li>
    <li>セミコロンコメント除去</li>
  </ul>

  <h2>未対応</h2>
  <ul>
    <li>完全なMUGEN式パーサ</li>
    <li>trigger1/trigger2 の正確なAND/OR評価</li>
    <li>バージョン差分の吸収</li>
    <li>Controllerごとの詳細正規化</li>
  </ul>

  <h2>実行</h2>
  <pre>npm test</pre>
</body>
</html>
