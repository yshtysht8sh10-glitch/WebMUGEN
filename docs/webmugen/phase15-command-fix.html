<h1>Phase15 Command Fix 2</h1>
<p><code>D,DF,F,a</code> の最後で、<code>DF+a</code> の同一フレーム入力を許可する。</p>
<h2>修正</h2>
<ul>
<li>方向ステップとボタンステップが同一フレームで成立できるようにした。</li>
<li>これにより最後を <code>F+a</code> または <code>DF+a</code> で押しても <code>qcf_a</code> が成立する。</li>
<li><code>/F+/U</code> の斜めジャンプ同時押し修正も維持。</li>
</ul>
