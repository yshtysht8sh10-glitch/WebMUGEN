<h1>AIR Bracket Begin Action Phase28</h1>
<p>This phase adds support for KFM-style bracketed AIR action headers.</p>
<ul>
<li><code>Begin Action 0</code></li>
<li><code>[Begin Action 000]</code></li>
</ul>
<p>This should allow KFM Action 0 to expose actual group/image elements instead of <code>sprite=none</code>.</p>
