<body>
  <h1>Phase7 Physics Fix</h1>
  <p>Phase7の簡易当たり判定導入後に見つかった移動物理の問題を修正する。</p>

  <h2>追加修正</h2>
  <p><code>VelSet</code> や <code>Gravity</code> のような速度変更Controllerが実行されたフレームでは、地上摩擦を適用しない。</p>
  <p>これにより、<code>VelSet x = 2</code> が同フレームで <code>2 * 0.82</code> に減衰してしまう問題を防ぐ。</p>
</body>
