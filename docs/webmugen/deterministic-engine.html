<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deterministic Engine</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.75; margin: 0; color: #222; background: #f7f7f7; }
    header { background: #0f172a; color: white; padding: 28px 32px; }
    main { max-width: 1040px; margin: 0 auto; padding: 32px; background: white; }
    h1,h2,h3 { line-height: 1.35; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; }
    pre { background: #111827; color: #e5e7eb; padding: 16px; overflow: auto; border-radius: 8px; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th,td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
    th { background: #f3f4f6; }
    .note { border-left: 5px solid #2563eb; background: #eff6ff; padding: 14px 18px; margin: 18px 0; }
  </style>
</head>
<body>
<header><h1>Deterministic Engine</h1><p>リプレイとrollback通信対戦のため、同じ入力から同じ結果を出すエンジンを目指す。</p></header>
<main>

<ul>
<li>ゲーム更新は固定フレームで行う。</li>
<li>入力はフレーム番号付きで保存する。</li>
<li>乱数を使う場合はseed固定の疑似乱数に限定する。</li>
<li>GameStateはserialize / deserializeできるようにする。</li>
<li>描画フレームレートとゲーム更新を混同しない。</li>
</ul><pre>nextState = engine.step(currentState, frameInput)</pre>

</main>
</body>
</html>
